name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov ruff mypy

      - name: Lint
        run: ruff check loci tests

      - name: Type check
        run: mypy loci

      - name: Tests
        run: pytest --tb=short
